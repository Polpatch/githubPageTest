<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
    <title>Allenamento WASM</title>

    <!-- PWA manifest & theme -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1f2e"  media="(prefers-color-scheme: dark)" />

    <!-- iOS PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Training" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
            .catch(e => console.warn('SW:', e));
        });
      }
    </script>

    <!-- Trunk build -->
    <link data-trunk rel="rust" href="Cargo.toml" />
    <link data-trunk rel="copy-dir"  href="schede" />
    <link data-trunk rel="copy-dir"  href="icons" />
    <link data-trunk rel="copy-file" href="manifest.json" />
    <link data-trunk rel="copy-file" href="sw.js" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

        /* ── Backgrounds ─────────────────────────── */
        --bg:        #f6f7fb;
        --surface:   #ffffff;
        --surface-2: #f9fafb;
        --surface-3: #f3f4f6;

        /* ── Text ────────────────────────────────── */
        --text:   #111111;
        --text-2: #555555;
        --text-3: #6b7280;
        --text-4: #9ca3af;

        /* ── Borders ─────────────────────────────── */
        --border:   #e5e7eb;
        --border-2: #d1d5db;
        --border-3: #dedfe3;

        /* ── Accent (blue) ───────────────────────── */
        --blue:        #2563eb;
        --blue-dk:     #1d4ed8;
        --blue-bg:     #eff6ff;
        --blue-soft:   #dbeafe;
        --blue-ring:   #bfdbfe;
        --blue-hover:  #93c5fd;
        --blue-glow:   rgba(37,99,235,.15);
        --blue-glow-lg:rgba(37,99,235,.25);
        --blue-focus:  rgba(37,99,235,.10);

        /* ── Red ─────────────────────────────────── */
        --red:        #b91c1c;
        --red-bg:     #fff1f1;
        --red-border: #fecaca;

        /* ── Green ───────────────────────────────── */
        --green:        #166534;
        --green-mid:    #16a34a;
        --green-bright: #4ade80;
        --green-bg:     #f0fdf4;
        --green-soft:   #dcfce7;
        --green-border: #86efac;

        /* ── Amber / Warning ─────────────────────── */
        --amber:        #92400e;
        --amber-bg:     #fff7e0;
        --amber-border: #ffe4a3;

        /* ── Primary action button ───────────────── */
        --btn-primary-bg: #111111;
        --btn-primary-fg: #f6f7fb;

        /* ── Shadows ─────────────────────────────── */
        --sh-sm:      rgba(12,18,40,.05);
        --sh-md:      rgba(12,18,40,.08);
        --sh-lg:      rgba(12,18,40,.14);
        --sh-xl:      rgba(12,18,40,.16);
        --sh-overlay: rgba(12,18,40,.45);
        --sh-modal:   rgba(12,18,40,.60);

        background: var(--bg);
        color: var(--text);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg:        #0f1117;
          --surface:   #1c1f2e;
          --surface-2: #191c2a;
          --surface-3: #252838;

          --text:   #f1f5f9;
          --text-2: #94a3b8;
          --text-3: #64748b;
          --text-4: #475569;

          --border:   #2d3148;
          --border-2: #374162;
          --border-3: #2d3148;

          --blue:        #3b82f6;
          --blue-dk:     #2563eb;
          --blue-bg:     #172554;
          --blue-soft:   #1e3253;
          --blue-ring:   #1e3a8a;
          --blue-hover:  #1e40af;
          --blue-glow:   rgba(59,130,246,.30);
          --blue-glow-lg:rgba(59,130,246,.40);
          --blue-focus:  rgba(59,130,246,.25);

          --red:        #f87171;
          --red-bg:     #2d1515;
          --red-border: #7f1d1d;

          --green:        #4ade80;
          --green-mid:    #22c55e;
          --green-bright: #86efac;
          --green-bg:     #052e16;
          --green-soft:   #14532d;
          --green-border: #166534;

          --amber:        #fbbf24;
          --amber-bg:     #2d1f00;
          --amber-border: #78350f;

          --btn-primary-bg: #3b82f6;
          --btn-primary-fg: #ffffff;

          --sh-sm:      rgba(0,0,0,.25);
          --sh-md:      rgba(0,0,0,.35);
          --sh-lg:      rgba(0,0,0,.45);
          --sh-xl:      rgba(0,0,0,.50);
          --sh-overlay: rgba(0,0,0,.65);
          --sh-modal:   rgba(0,0,0,.80);
        }
      }
      * { box-sizing: border-box; }
      /* Reset browser-default button styling so dark mode variables apply cleanly */
      button { background: transparent; border: none; cursor: pointer; font-family: inherit; font-size: inherit; color: inherit; padding: 0; }
      body { margin: 0; min-height: 100vh; }
      .app-shell { max-width: 980px; margin: 0 auto; padding: 20px; padding-top: 96px; }
      .app-header { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 24px; }
      .app-header h1 { margin: 0 0 6px; font-size: clamp(1.8rem, 2.5vw, 2.8rem); }
      .app-header p { margin: 0; color: var(--text-2); max-width: 640px; }
      .clear-button { background: var(--btn-primary-bg); color: var(--btn-primary-fg); border: 0; border-radius: 999px; padding: 12px 18px; cursor: pointer; font-weight: 600; }
      .app-main { display: grid; gap: 18px; padding-bottom: 80px; }
      .upload-panel { display: grid; gap: 18px; }
      .upload-card { background: var(--surface); border-radius: 24px; padding: 28px; box-shadow: 0 16px 48px var(--sh-sm); }
      .file-label { display: inline-flex; align-items: center; justify-content: center; cursor: pointer; background: var(--btn-primary-bg); color: var(--btn-primary-fg); border-radius: 999px; padding: 14px 20px; font-weight: 600; border: 1px solid transparent; }
      .file-label input { display: none; }
      .hint { margin: 14px 0 0; color: var(--text-3); line-height: 1.6; }
      .catalog-list { display: grid; gap: 12px; margin-top: 16px; }
      .catalog-card { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; cursor: pointer; transition: box-shadow .2s ease; }
      .catalog-card:hover { box-shadow: 0 12px 30px var(--sh-md); }
      .catalog-info { display: grid; gap: 4px; flex: 1; min-width: 0; }
      .catalog-title-row { display: flex; align-items: center; gap: 8px; min-width: 0; }
      .catalog-title { font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .catalog-meta { color: var(--text-3); font-size: 0.92rem; }
      /* Catalog select button */
      .select-button { background: var(--surface-3); color: var(--text); border: 1.5px solid var(--border); border-radius: 999px; padding: 8px 18px; font-size: 0.9rem; font-weight: 600; white-space: nowrap; transition: background .15s; flex-shrink: 0; }
      .select-button:hover { background: var(--border); }
      .select-button--featured { background: var(--blue); color: white; border-color: var(--blue); }
      .select-button--featured:hover { background: var(--blue-dk); border-color: var(--blue-dk); }
      /* Featured catalog card */
      .catalog-card--featured { flex-direction: column; align-items: flex-start; gap: 14px; border: 2px solid var(--blue); background: var(--blue-bg); padding: 20px; }
      .catalog-card--featured .catalog-title { font-size: 1.05rem; }
      .catalog-card--featured .select-button { width: 100%; text-align: center; }
      .star-btn { flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.95rem; color: var(--text-4); transition: color .15s, background .15s; padding: 0; }
      .star-btn:hover { color: var(--blue); }
      .star-btn--active { color: var(--blue); }
      .catalog-featured-badge { font-size: 0.72rem; font-weight: 700; color: var(--blue); background: var(--blue-soft); padding: 2px 8px; border-radius: 999px; letter-spacing: 0.05em; text-transform: uppercase; white-space: nowrap; }
      /* ── Calendar ──────────────────────────────────────────────────────── */
      .calendar { background: var(--surface); border-radius: 24px; padding: 18px 20px 14px; box-shadow: 0 1px 4px var(--sh-sm); margin-bottom: 0; overflow: hidden; }
      .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
      .cal-month-label { font-weight: 700; font-size: 1rem; }
      .cal-nav { font-size: 1.3rem; color: var(--text-3); padding: 4px 10px; border-radius: 8px; line-height: 1; }
      .cal-nav:hover { background: var(--surface-3); color: var(--text); }
      .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 2px; }
      .cal-weekday { text-align: center; font-size: 0.7rem; color: var(--text-4); font-weight: 600; padding: 3px 0; }
      .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
      .cal-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40px; border-radius: 8px; cursor: pointer; padding: 2px 0; gap: 2px; }
      .cal-cell:hover:not(.cal-cell--empty) { background: var(--surface-3); }
      .cal-cell--empty { cursor: default; }
      .cal-cell--today .cal-day-num { background: var(--blue); color: white; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
      .cal-day-num { font-size: 0.82rem; font-weight: 500; color: var(--text); line-height: 1; }
      .cal-cell--today .cal-day-num { font-weight: 700; }
      .cal-dots { display: flex; gap: 3px; align-items: center; height: 6px; }
      .cal-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
      .cal-dot--done { background: var(--blue); }
      .cal-dot--open { border: 1.5px solid var(--blue); background: transparent; }
      .cal-cta { display: flex; align-items: center; gap: 12px; width: 100%; overflow: hidden; margin-top: 14px; padding: 12px 16px; border-radius: 14px; font-size: 0.9rem; text-align: left; transition: background .15s; }
      .cal-cta--suggest { background: var(--blue-bg); color: var(--blue); border: 1.5px solid var(--blue-ring); }
      .cal-cta--suggest:hover { background: var(--blue-soft); }
      .cal-cta--resume  { background: var(--surface-3); color: var(--text); border: 1.5px solid var(--border); }
      .cal-cta--resume:hover  { background: var(--border); }
      .cal-cta-text { width: 0; flex-grow: 1; display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
      .cal-cta-hint  { font-size: 0.72rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.06em; }
      .cal-cta-nome  { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
      .cal-cta-day   { font-size: 0.78rem; opacity: 0.75; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
      .cal-popup-overlay { position: fixed; inset: 0; background: var(--sh-modal); z-index: 250; display: flex; align-items: flex-end; justify-content: center; padding-bottom: env(safe-area-inset-bottom, 0); }
      .cal-popup { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-width: 640px; padding: 20px; display: flex; flex-direction: column; gap: 4px; max-height: 70vh; overflow-y: auto; }
      .cal-popup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
      .cal-popup-title { font-weight: 700; font-size: 1rem; }
      .cal-popup-close { color: var(--text-3); padding: 4px; border-radius: 8px; font-size: 1rem; display: inline-flex; }
      .cal-popup-item { display: flex; flex-direction: column; gap: 4px; padding: 12px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 14px; text-align: left; transition: background .15s; }
      .cal-popup-item:hover { background: var(--surface-3); }
      .cal-popup-nome { font-weight: 700; font-size: 0.95rem; }
      .cal-popup-meta { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--text-3); }
      .cal-popup-status { padding: 1px 8px; border-radius: 999px; font-size: 0.72rem; font-weight: 700; }
      .cal-popup-status--done { background: var(--blue-bg); color: var(--blue); }
      .cal-popup-status--open { background: var(--surface-3); color: var(--text-3); border: 1px solid var(--border-2); }
      /* ── Workout ────────────────────────────────────────────────────────── */
      .workout-details { display: grid; gap: 20px; }
      .workout-meta { background: var(--surface); border-radius: 24px; padding: 24px; box-shadow: 0 14px 34px var(--sh-sm); }
      .meta-label { font-size: 0.95rem; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
      .meta-desc { margin: 0 0 8px; color: var(--text-2); font-size: 0.9rem; line-height: 1.55; }
      .meta-desc--clamped { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .meta-expand-btn { font-size: 0.82rem; color: var(--blue); display: block; margin-bottom: 8px; }
      .meta-desc { margin: 0; color: var(--text-2); }
      .meta-tag { display: inline-block; margin-top: 14px; background: var(--blue-bg); color: var(--blue); padding: 8px 14px; border-radius: 999px; font-size: 0.88rem; }
      .day-tabs { display: flex; flex-wrap: wrap; gap: 10px; }
      .day-tab { background: var(--surface); color: var(--text); border: 1px solid var(--border-3); padding: 12px 18px; border-radius: 999px; cursor: pointer; transition: all .2s ease; }
      .day-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
      .exercise-list { display: grid; gap: 16px; }
      .exercise-card { background: var(--surface); border-radius: 24px; padding: 20px; box-shadow: 0 12px 32px var(--sh-sm); transition: box-shadow .2s ease; }
      .exercise-card:not(.selected) { cursor: pointer; padding: 18px 20px; }
      .exercise-card:not(.selected):hover { box-shadow: 0 16px 40px var(--sh-md); }
      /* Compact cards: hide meta/recovery on non-selected cards */
      .exercise-card:not(.selected) .exercise-meta,
      .exercise-card:not(.selected) .exercise-rec { display: none; }
      .exercise-head { display: flex; justify-content: space-between; gap: 14px; align-items: flex-start; }
      .chart-icon-btn { flex-shrink: 0; background: none; border: none; cursor: pointer; font-size: 1.1rem; opacity: 0.55; padding: 2px 4px; border-radius: 8px; transition: opacity .15s, background .15s; display: inline-flex; align-items: center; }
      .chart-icon-btn:hover { opacity: 1; background: var(--surface-3); }
      .weight-chart-section { margin: 12px 0 4px; padding: 12px 10px 6px; background: var(--surface-2); border-radius: 16px; border: 1px solid var(--border); }
      .chart-empty { font-size: 0.88rem; color: var(--text-4); margin: 0; padding: 8px 0; }
      /* SVG chart colors — CSS overrides SVG presentation attributes */
      .chart-gridline-light { stroke: var(--surface-3); }
      .chart-gridline       { stroke: var(--border); }
      .chart-ylabel         { fill: var(--text-4); }
      .chart-date           { fill: var(--text-4); }
      .chart-value          { fill: var(--text); }
      .chart-line           { stroke: var(--blue); fill: none; }
      .chart-dot            { fill: var(--blue); stroke: var(--surface); }
      .exercise-head h3 { margin: 0 0 8px; font-size: 1.15rem; }
      .exercise-meta { color: var(--text-3); font-size: 0.95rem; }
      .exercise-rec { color: var(--text); font-weight: 700; font-size: 0.94rem; margin-top: 8px; }
      .exercise-note { margin: 14px 0 0; color: var(--text-2); background: var(--amber-bg); padding: 14px 16px; border-radius: 16px; border: 1px solid var(--amber-border); }
      .cardio-done-tag { font-size: 0.78rem; color: var(--text-3); text-align: center; margin-top: 6px; }
      .cardio-stopwatch { display: flex; flex-direction: column; align-items: center; padding-bottom: 10px; }
      .cardio-timer-wrap { position: relative; margin: 1em 13% 0; width: 74%; aspect-ratio: 1; border-radius: 50%; background: transparent; border: 4px solid var(--blue); display: flex; align-items: center; justify-content: center; }
      .cardio-timer-label { position: absolute; top: 28%; left: 0; right: 0; text-align: center; font-weight: 300; font-size: 0.78rem; color: var(--text-3); letter-spacing: 0.12em; text-transform: uppercase; pointer-events: none; }
      .cardio-time { font-size: clamp(3rem, 15vw, 5rem); font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; color: var(--text); line-height: 1; }
      .cardio-target { font-size: 0.8rem; color: var(--text-3); margin-top: 12px; }
      .expanded-body { margin-top: 20px; }
      .series-progress { display: flex; align-items: center; justify-content: center; padding: 0 12%; margin-bottom: 20px; }
      .series-dot { flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%; background: var(--surface-3); border: 2px solid var(--border-2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; color: var(--text-4); transition: all .15s ease; padding: 0; position: relative; }
      .dot-arrow { position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); font-size: 0.42rem; line-height: 1; pointer-events: none; }
      .series-dot:hover { border-color: var(--blue-hover); color: var(--blue); }
      .series-dot.active { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
      .series-dot.completed { background: var(--blue); border-color: var(--blue-dk); color: white; }
      .series-dot.completed.active { background: var(--blue-dk); box-shadow: 0 0 0 3px var(--blue-glow-lg); }
      .series-line { flex: 1; min-width: 10px; height: 2px; background: var(--border-2); }
      .series-nav { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: var(--surface-3); border: 1.5px solid var(--border-2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: var(--text-3); padding: 0; transition: all .15s ease; }
      .series-nav:hover { background: var(--border); border-color: var(--text-4); color: var(--text); }
      .series-capsule { flex-shrink: 0; width: 54px; height: 34px; border-radius: 17px; border: 2px solid var(--border-2); transition: all .15s ease; }
      .series-capsule.active { background: var(--blue-bg); border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
      .series-capsule.completed { background: var(--blue); border-color: var(--blue-dk); }
      .carousel-outer {
        position: relative; overflow: hidden;
        margin: 0 12% 20px; height: 54px;
        cursor: grab; user-select: none; -webkit-user-select: none; touch-action: none;
      }
      .carousel-outer:active { cursor: grabbing; }
      .carousel-track {
        position: absolute; left: 50%; top: 50%;
        display: flex; align-items: center;
        width: max-content; will-change: transform;
      }
      .carousel-track--snap { transition: transform 0.25s ease; }
      .series-line--c { flex-shrink: 0; width: 20px; height: 2px; background: var(--border-2); }
      .series-row { display: grid; gap: 14px; margin-bottom: 16px; padding: 16px; border: 1px solid var(--border); border-radius: 18px; background: var(--surface-2); }
      .series-row-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; font-weight: 700; color: var(--text); }
      .series-status { font-size: 0.92rem; color: var(--text-2); }
      .series-status.pending { color: var(--text-4); }
      .day-header h2 { margin: 0; }
      .day-header p { margin: 6px 0 0; color: var(--text-3); }
      .active-exercise { background: var(--surface); border-radius: 24px; padding: 24px; box-shadow: 0 16px 50px var(--sh-md); border: 1px solid var(--border); }
      .active-head { display: grid; gap: 10px; margin-bottom: 20px; }
      .active-label { color: var(--text-4); text-transform: uppercase; letter-spacing: 0.12em; font-size: 0.82rem; }
      .input-row { display: flex; flex-direction: column; gap: 14px; margin-bottom: 8px; }
      .input-field { display: flex; flex-direction: column; gap: 8px; }
      .input-label { font-size: 0.82rem; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; }
      .weight-val-input { width: 100%; text-align: center; padding: 13px 12px; border-radius: 14px; border: 1.5px solid var(--border-2); font-size: 1.35rem; font-weight: 700; color: var(--text); background: var(--surface); }
      .weight-val-input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 0 3px var(--blue-focus); }
      .step-row { display: flex; align-items: center; gap: 8px; }
      .step-btn { flex: 1; height: 46px; border-radius: 12px; background: var(--surface-3); border: 1.5px solid var(--border); font-size: 1.4rem; font-weight: 700; color: var(--text-2); cursor: pointer; transition: background .1s; }
      .step-btn:active { background: var(--border); }
      .step-selector { flex-shrink: 0; min-width: 82px; height: 46px; border-radius: 12px; background: var(--blue-bg); border: 1.5px solid var(--blue-ring); color: var(--blue); font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: background .1s; letter-spacing: 0.01em; }
      .step-selector:active { background: var(--blue-soft); }
      .reps-row { display: flex; align-items: center; gap: 8px; }
      .reps-val-input { flex: 1; min-width: 0; height: 48px; text-align: center; padding: 0 8px; border-radius: 12px; border: 1.5px solid var(--border-2); font-size: 1.2rem; font-weight: 700; color: var(--text); background: var(--surface); }
      .reps-val-input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 0 3px var(--blue-focus); }
