<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piattaforma Allenamento Estremo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
--color-bg:#0f0f0f;
--color-surface:#1a1a1a;
--color-surface-2:#222222;
--color-surface-offset:#2a2a2a;
--color-border:#333333;
--color-divider:#2a2a2a;
--color-text:#e8e8e8;
--color-text-muted:#999999;
--color-text-faint:#555555;
--color-primary:#f97316;
--color-primary-hover:#ea6c0a;
--color-primary-active:#d45f00;
--color-primary-highlight:#3a1c00;
--color-success:#22c55e;
--color-success-highlight:#0f2a1a;
--color-warning:#eab308;
--color-error:#ef4444;
--color-blue:#3b82f6;
--radius-sm:4px;
--radius-md:8px;
--radius-lg:12px;
--radius-xl:16px;
--radius-full:9999px;
--space-1:0.25rem;
--space-2:0.5rem;
--space-3:0.75rem;
--space-4:1rem;
--space-5:1.25rem;
--space-6:1.5rem;
--space-8:2rem;
--space-10:2.5rem;
--space-12:3rem;
--text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
--text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
--text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
--text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
--text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
--font-body:'Inter',sans-serif;
--font-display:'Bebas Neue',sans-serif;
--shadow-md:0 4px 12px rgba(0,0,0,0.4);
--shadow-lg:0 12px 32px rgba(0,0,0,0.6);
--transition:180ms cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit;transition:all var(--transition);}
img{display:block;max-width:100%;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;}

/* ===== LAYOUT ===== */
.app-header{
  position:sticky;top:0;z-index:100;
  background:var(--color-surface);
  border-bottom:1px solid var(--color-border);
  padding:var(--space-3) var(--space-6);
  display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);
}
.app-logo{
  display:flex;align-items:center;gap:var(--space-3);
  font-family:var(--font-display);font-size:var(--text-lg);letter-spacing:0.05em;
  color:var(--color-text);text-decoration:none;
}
.app-logo svg{flex-shrink:0;color:var(--color-primary);}
.header-actions{display:flex;align-items:center;gap:var(--space-2);}

.main-content{
  max-width:900px;margin:0 auto;
  padding:var(--space-8) var(--space-4);
}

/* ===== WORKOUT SELECTOR ===== */
#screen-selector{}
.selector-title{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  letter-spacing:0.04em;
  margin-bottom:var(--space-2);
}
.selector-subtitle{color:var(--color-text-muted);margin-bottom:var(--space-8);}
.workout-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:var(--space-4);
}
.workout-card{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  padding:var(--space-5);
  cursor:pointer;
  transition:all var(--transition);
  text-align:left;
}
.workout-card:hover{
  border-color:var(--color-primary);
  background:var(--color-surface-2);
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
}
.workout-card-cat{
  display:inline-block;
  font-size:var(--text-xs);
  font-weight:600;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--color-primary);
  background:var(--color-primary-highlight);
  border-radius:var(--radius-full);
  padding:2px var(--space-3);
  margin-bottom:var(--space-3);
}
.workout-card-name{
  font-family:var(--font-display);
  font-size:var(--text-lg);
  letter-spacing:0.03em;
  margin-bottom:var(--space-1);
}
.workout-card-desc{font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-4);}
.workout-card-days{
  display:flex;flex-wrap:wrap;gap:var(--space-2);
}
.day-chip{
  font-size:var(--text-xs);
  background:var(--color-surface-offset);
  border:1px solid var(--color-border);
  border-radius:var(--radius-full);
  padding:2px var(--space-3);
  color:var(--color-text-muted);
}

/* ===== DAY SELECTOR ===== */
#screen-days{display:none;}
.back-btn{
  display:inline-flex;align-items:center;gap:var(--space-2);
  font-size:var(--text-sm);color:var(--color-text-muted);
  background:none;border:none;cursor:pointer;padding:0;
  margin-bottom:var(--space-6);
  transition:color var(--transition);
}
.back-btn:hover{color:var(--color-text);}
.back-btn svg{width:16px;height:16px;}
.workout-title-row{
  display:flex;align-items:center;gap:var(--space-4);
  margin-bottom:var(--space-2);
}
.workout-main-title{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  letter-spacing:0.04em;
}
.workout-desc{color:var(--color-text-muted);margin-bottom:var(--space-6);}
.day-tabs{
  display:flex;flex-wrap:wrap;gap:var(--space-2);
  margin-bottom:var(--space-8);
}
.day-tab{
  font-size:var(--text-sm);font-weight:500;
  padding:var(--space-2) var(--space-5);
  border-radius:var(--radius-full);
  border:1px solid var(--color-border);
  background:var(--color-surface);
  color:var(--color-text-muted);
  cursor:pointer;
  transition:all var(--transition);
}
.day-tab:hover{border-color:var(--color-primary);color:var(--color-text);}
.day-tab.active{
  background:var(--color-primary);
  border-color:var(--color-primary);
  color:#fff;
  font-weight:600;
}

/* ===== EXERCISE TABLE ===== */
#screen-workout{display:none;}
.day-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:var(--space-6);
  flex-wrap:wrap;gap:var(--space-3);
}
.day-title{
  font-family:var(--font-display);
  font-size:var(--text-xl);
  letter-spacing:0.04em;
}
.save-btn{
  display:flex;align-items:center;gap:var(--space-2);
  background:var(--color-primary);color:#fff;
  border-radius:var(--radius-md);
  padding:var(--space-2) var(--space-5);
  font-size:var(--text-sm);font-weight:600;
  transition:all var(--transition);
}
.save-btn:hover{background:var(--color-primary-hover);}
.save-btn.saved{background:var(--color-success);}
.save-btn svg{width:16px;height:16px;}

.exercise-list{display:flex;flex-direction:column;gap:var(--space-4);}
.exercise-card{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-lg);
  overflow:hidden;
  transition:border-color var(--transition);
}
.exercise-card.active-rest{border-color:var(--color-primary);}
.exercise-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:var(--space-4) var(--space-5);
  gap:var(--space-4);
  cursor:pointer;
}
.exercise-name{
  font-weight:600;
  font-size:var(--text-base);
  margin-bottom:var(--space-1);
}
.exercise-meta{
  display:flex;flex-wrap:wrap;gap:var(--space-2);
  font-size:var(--text-xs);
  color:var(--color-text-muted);
}
.meta-chip{
  background:var(--color-surface-offset);
  border-radius:var(--radius-full);
  padding:2px var(--space-3);
}
.exercise-note{
  font-size:var(--text-xs);
  color:var(--color-warning);
  background:rgba(234,179,8,0.08);
  border-radius:var(--radius-md);
  padding:var(--space-2) var(--space-4);
  margin:0 var(--space-5) var(--space-3);
}
.exercise-note:empty{display:none;}
.history-btn{
  flex-shrink:0;
  display:flex;align-items:center;gap:var(--space-1);
  font-size:var(--text-xs);color:var(--color-text-muted);
  padding:var(--space-1) var(--space-3);
  border:1px solid var(--color-border);
  border-radius:var(--radius-full);
  transition:all var(--transition);
}
.history-btn:hover{border-color:var(--color-primary);color:var(--color-primary);}
.history-btn svg{width:12px;height:12px;}

/* ===== SERIE DOTS ===== */
.series-row{
  display:flex;align-items:center;flex-wrap:wrap;
  gap:var(--space-3);
  padding:var(--space-3) var(--space-5) var(--space-4);
}
.serie-dot{
  width:40px;height:40px;
  border-radius:50%;
  border:2px solid var(--color-border);
  background:var(--color-surface-2);
  display:flex;align-items:center;justify-content:center;
  font-size:var(--text-xs);font-weight:700;
  cursor:pointer;
  transition:all var(--transition);
  position:relative;
}
.serie-dot:hover{border-color:var(--color-primary);}
.serie-dot.done{
  background:var(--color-primary);
  border-color:var(--color-primary);
  color:#fff;
}
.serie-dot.last-done{
  background:var(--color-success);
  border-color:var(--color-success);
  color:#fff;
}
.serie-inputs{
  display:flex;align-items:center;gap:var(--space-3);
  padding:0 var(--space-5) var(--space-4);
  flex-wrap:wrap;
}
.input-group{
  display:flex;flex-direction:column;gap:4px;
  flex:1;min-width:100px;
}
.input-group label{
  font-size:var(--text-xs);color:var(--color-text-muted);
  font-weight:600;letter-spacing:0.05em;text-transform:uppercase;
}
.input-group input,.input-group textarea{
  background:var(--color-surface-offset);
  border:1px solid var(--color-border);
  border-radius:var(--radius-md);
  padding:var(--space-2) var(--space-3);
  font-size:var(--text-sm);
  color:var(--color-text);
  width:100%;
  transition:border-color var(--transition);
}
.input-group input:focus,.input-group textarea:focus{
  outline:none;
  border-color:var(--color-primary);
}
.input-group textarea{resize:vertical;min-height:60px;}

/* ===== TIMER OVERLAY ===== */
#timer-overlay{
  display:none;
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(6px);
  align-items:center;justify-content:center;
}
#timer-overlay.active{display:flex;}
.timer-card{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-xl);
  padding:var(--space-8) var(--space-10);
  min-width:300px;
  text-align:center;
  box-shadow:var(--shadow-lg);
}
.timer-label{
  font-size:var(--text-sm);color:var(--color-text-muted);
  text-transform:uppercase;letter-spacing:0.1em;
  margin-bottom:var(--space-2);
}
.timer-exercise-name{
  font-family:var(--font-display);
  font-size:var(--text-lg);
  margin-bottom:var(--space-6);
  letter-spacing:0.04em;
}
.timer-display{
  font-family:var(--font-display);
  font-size:clamp(4rem,12vw,7rem);
  line-height:1;
  margin-bottom:var(--space-2);
  transition:color var(--transition);
}
.timer-display.warning{color:var(--color-warning);}
.timer-display.done-color{color:var(--color-success);}
.timer-progress{
  width:100%;height:6px;
  background:var(--color-surface-offset);
  border-radius:var(--radius-full);
  margin-bottom:var(--space-6);
  overflow:hidden;
}
.timer-progress-bar{
  height:100%;
  background:var(--color-primary);
  border-radius:var(--radius-full);
  transition:width 1s linear, background 0.3s;
  width:100%;
}
.timer-progress-bar.warning{background:var(--color-warning);}
.timer-actions{
  display:flex;gap:var(--space-3);justify-content:center;flex-wrap:wrap;
}
.timer-btn{
  padding:var(--space-2) var(--space-5);
  border-radius:var(--radius-md);
  font-size:var(--text-sm);font-weight:600;
  border:1px solid var(--color-border);
  transition:all var(--transition);
}
.timer-btn:hover{border-color:var(--color-primary);color:var(--color-primary);}
.timer-btn.primary-btn{
  background:var(--color-primary);border-color:var(--color-primary);color:#fff;
}
.timer-btn.primary-btn:hover{background:var(--color-primary-hover);border-color:var(--color-primary-hover);}
.timer-serie-info{
  font-size:var(--text-xs);color:var(--color-text-muted);
  margin-bottom:var(--space-4);
}

/* ===== HISTORY DRAWER ===== */
#history-drawer{
  display:none;
  position:fixed;right:0;top:0;bottom:0;z-index:300;
  width:min(380px,100vw);
  background:var(--color-surface);
  border-left:1px solid var(--color-border);
  box-shadow:var(--shadow-lg);
  flex-direction:column;
}
#history-drawer.open{display:flex;}
.drawer-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:var(--space-5) var(--space-6);
  border-bottom:1px solid var(--color-border);
}
.drawer-title{font-family:var(--font-display);font-size:var(--text-lg);letter-spacing:0.04em;}
.drawer-close-btn{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--color-border);
  transition:all var(--transition);
}
.drawer-close-btn:hover{border-color:var(--color-error);color:var(--color-error);}
.drawer-body{flex:1;overflow-y:auto;padding:var(--space-5) var(--space-6);}
.history-empty{color:var(--color-text-muted);font-size:var(--text-sm);text-align:center;padding:var(--space-10) 0;}
.history-entry{
  background:var(--color-surface-2);
  border-radius:var(--radius-md);
  padding:var(--space-3) var(--space-4);
  margin-bottom:var(--space-3);
}
.history-date{font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-1);}
.history-weight{font-weight:700;font-size:var(--text-base);color:var(--color-primary);}
.history-reps{font-size:var(--text-sm);color:var(--color-text-muted);}
.history-note{font-size:var(--text-xs);color:var(--color-text-faint);margin-top:var(--space-1);font-style:italic;}

/* ===== DRAWER BACKDROP ===== */
#drawer-backdrop{
  display:none;position:fixed;inset:0;z-index:299;
  background:rgba(0,0,0,0.5);
}
#drawer-backdrop.open{display:block;}

/* ===== EMPTY / LOADING ===== */
.loading-state{text-align:center;padding:var(--space-12);color:var(--color-text-muted);}
.error-state{
  background:rgba(239,68,68,0.1);border:1px solid var(--color-error);
  border-radius:var(--radius-md);padding:var(--space-6);
  text-align:center;color:var(--color-error);
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .app-header{padding:var(--space-3) var(--space-4);}
  .main-content{padding:var(--space-6) var(--space-3);}
  .timer-card{padding:var(--space-6);min-width:unset;width:90vw;}
  .serie-inputs{flex-direction:column;}
  .input-group{min-width:unset;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <a class="app-logo" href="#">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="Logo">
      <rect x="2" y="14" width="6" height="12" rx="2" fill="currentColor"/>
      <rect x="11" y="8" width="6" height="18" rx="2" fill="currentColor"/>
      <rect x="20" y="2" width="6" height="24" rx="2" fill="currentColor"/>
    </svg>
    ALLENAMENTO ESTREMO
  </a>
  <div class="header-actions">
    <button id="btn-change-workout" style="display:none;font-size:var(--text-sm);color:var(--color-text-muted);border:1px solid var(--color-border);border-radius:var(--radius-full);padding:var(--space-1) var(--space-4);transition:all var(--transition)" onmouseover="this.style.borderColor='var(--color-primary)';this.style.color='var(--color-primary)'" onmouseout="this.style.borderColor='var(--color-border)';this.style.color='var(--color-text-muted)'">
      Cambia scheda
    </button>
  </div>
</header>

<!-- MAIN -->
<main class="main-content" id="main-content">

  <!-- SCREEN 1: SELEZIONE SCHEDA -->
  <div id="screen-selector">
    <div id="loading-workouts" class="loading-state">
      <p>Caricamento schede…</p>
    </div>
    <div id="workouts-loaded" style="display:none">
      <h1 class="selector-title">Le tue schede</h1>
      <p class="selector-subtitle">Seleziona una scheda per iniziare l'allenamento</p>
      <div class="workout-grid" id="workout-grid"></div>
    </div>
    <div id="load-error" class="error-state" style="display:none">
      <p>Impossibile caricare <code>scheda.json</code>. Assicurati che il file esista nel repository.</p>
    </div>
  </div>

  <!-- SCREEN 2: SELEZIONE GIORNO -->
  <div id="screen-days">
    <button class="back-btn" id="back-to-selector">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 3L5 8l5 5"/></svg>
      Tutte le schede
    </button>
    <div class="workout-title-row">
      <h2 class="workout-main-title" id="days-screen-title"></h2>
    </div>
    <p class="workout-desc" id="days-screen-desc"></p>
    <div class="day-tabs" id="day-tabs"></div>
  </div>

  <!-- SCREEN 3: ALLENAMENTO -->
  <div id="screen-workout">
    <button class="back-btn" id="back-to-days">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 3L5 8l5 5"/></svg>
      <span id="back-to-days-label">Torna ai giorni</span>
    </button>
    <div class="day-header">
      <h2 class="day-title" id="workout-day-title"></h2>
      <button class="save-btn" id="save-session-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M13 2H3a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1V2z"/><path d="M5 2v5h6V2"/><path d="M8 11v3"/></svg>
        Salva sessione
      </button>
    </div>
    <div class="exercise-list" id="exercise-list"></div>
  </div>

</main>

<!-- TIMER OVERLAY -->
<div id="timer-overlay" role="dialog" aria-modal="true" aria-label="Timer di recupero">
  <div class="timer-card">
    <div class="timer-label">Recupero</div>
    <div class="timer-exercise-name" id="timer-ex-name"></div>
    <div class="timer-serie-info" id="timer-serie-info"></div>
    <div class="timer-display" id="timer-display">1:30</div>
    <div class="timer-progress"><div class="timer-progress-bar" id="timer-progress-bar"></div></div>
    <div class="timer-actions">
      <button class="timer-btn" id="timer-add30">+30s</button>
      <button class="timer-btn" id="timer-pause">Pausa</button>
      <button class="timer-btn primary-btn" id="timer-skip">Salta</button>
    </div>
  </div>
</div>

<!-- HISTORY DRAWER -->
<div id="drawer-backdrop"></div>
<div id="history-drawer" role="dialog" aria-modal="true" aria-label="Storico esercizio">
  <div class="drawer-header">
    <span class="drawer-title" id="drawer-title">Storico</span>
    <button class="drawer-close-btn" id="drawer-close" aria-label="Chiudi">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l10 10M13 3L3 13"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const LS_KEY = 'pal_estremo_v1';
let allWorkouts = [];
let currentWorkout = null;
let currentDayIndex = 0;
let sessionData = {}; // { exerciseId: { sets: [{peso,reps,note}], done: [bool] } }

// Timer state
let timerInterval = null;
let timerTotal = 90;
let timerRemaining = 90;
let timerPaused = false;
let timerExerciseName = '';

// ============================================================
// STORAGE
// ============================================================
function loadStorage() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
  catch(e) { return {}; }
}
function saveStorage(data) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}

// Returns key for a session: workoutId + dayIndex + date
function sessionKey(workoutId, dayIndex, date) {
  return workoutId + '__day' + dayIndex + '__' + date;
}
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ============================================================
// FETCH SCHEDA
// ============================================================
async function loadWorkouts() {
  try {
    const resp = await fetch('./scheda.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    allWorkouts = await resp.json();
    showSelectorScreen();
  } catch(e) {
    document.getElementById('loading-workouts').style.display = 'none';
    document.getElementById('load-error').style.display = 'block';
  }
}

// ============================================================
// SCREENS
// ============================================================
function hideAllScreens() {
  document.getElementById('screen-selector').style.display = 'none';
  document.getElementById('screen-days').style.display = 'none';
  document.getElementById('screen-workout').style.display = 'none';
}

function showSelectorScreen() {
  hideAllScreens();
  document.getElementById('screen-selector').style.display = '';
  document.getElementById('btn-change-workout').style.display = 'none';
  document.getElementById('loading-workouts').style.display = 'none';
  document.getElementById('workouts-loaded').style.display = '';
  renderWorkoutGrid();
}

function showDaysScreen(workout) {
  currentWorkout = workout;
  hideAllScreens();
  document.getElementById('screen-days').style.display = '';
  document.getElementById('btn-change-workout').style.display = '';
  document.getElementById('days-screen-title').textContent = workout.nome;
  document.getElementById('days-screen-desc').textContent = workout.descrizione || '';
  renderDayTabs(workout);
}

function showWorkoutScreen(workout, dayIndex) {
  currentDayIndex = dayIndex;
  const day = workout.giorni[dayIndex];
  hideAllScreens();
  document.getElementById('screen-workout').style.display = '';
  document.getElementById('btn-change-workout').style.display = '';
  document.getElementById('workout-day-title').textContent = day.giorno + ' — ' + day.etichetta;
  document.getElementById('back-to-days-label').textContent = workout.nome;
  // Load today's session from storage
  const store = loadStorage();
  const key = sessionKey(workout.id, dayIndex, todayStr());
  sessionData = store[key] || {};
  renderExerciseList(day.esercizi);
}

// ============================================================
// RENDER: WORKOUT GRID
// ============================================================
function renderWorkoutGrid() {
  const grid = document.getElementById('workout-grid');
  grid.innerHTML = '';
  if (!allWorkouts.length) {
    grid.innerHTML = '<p style="color:var(--color-text-muted)">Nessuna scheda trovata in scheda.json</p>';
    return;
  }
  allWorkouts.forEach(workout => {
    const card = document.createElement('button');
    card.className = 'workout-card';
    const daysHtml = (workout.giorni || []).map(g =>
      `<span class="day-chip">${g.giorno}</span>`
    ).join('');
    card.innerHTML = `
      <span class="workout-card-cat">${workout.categoria || 'Scheda'}</span>
      <div class="workout-card-name">${workout.nome}</div>
      <div class="workout-card-desc">${workout.descrizione || ''}</div>
      <div class="workout-card-days">${daysHtml}</div>
    `;
    card.addEventListener('click', () => showDaysScreen(workout));
    grid.appendChild(card);
  });
}

// ============================================================
// RENDER: DAY TABS
// ============================================================
function renderDayTabs(workout) {
  const container = document.getElementById('day-tabs');
  container.innerHTML = '';
  workout.giorni.forEach((day, idx) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (idx === 0 ? ' active' : '');
    btn.textContent = day.giorno;
    btn.addEventListener('click', () => {
      container.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      showWorkoutScreen(workout, idx);
    });
    container.appendChild(btn);
  });
  // Auto-select first day
  if (workout.giorni.length > 0) showWorkoutScreen(workout, 0);
}

// ============================================================
// RENDER: EXERCISE LIST
// ============================================================
function renderExerciseList(exercises) {
  const list = document.getElementById('exercise-list');
  list.innerHTML = '';
  exercises.forEach(ex => {
    if (!sessionData[ex.id]) {
      sessionData[ex.id] = {
        sets: Array.from({length: ex.serie}, () => ({peso:'', reps:'', note:''})),
        done: Array(ex.serie).fill(false)
      };
    }
    list.appendChild(buildExerciseCard(ex));
  });
}

function buildExerciseCard(ex) {
  const card = document.createElement('div');
  card.className = 'exercise-card';
  card.id = 'ex-card-' + ex.id;

  // Header
  const header = document.createElement('div');
  header.className = 'exercise-header';
  header.innerHTML = `
    <div>
      <div class="exercise-name">${ex.nome}</div>
      <div class="exercise-meta">
        <span class="meta-chip">${ex.serie} serie</span>
        <span class="meta-chip">${ex.reps} reps</span>
        ${ex.recupero ? `<span class="meta-chip">⏱ ${ex.recupero}s</span>` : ''}
      </div>
    </div>
    <button class="history-btn" data-exid="${ex.id}" aria-label="Storico">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
      Storico
    </button>
  `;
  card.appendChild(header);

  // Note
  if (ex.note) {
    const noteEl = document.createElement('div');
    noteEl.className = 'exercise-note';
    noteEl.textContent = ex.note;
    card.appendChild(noteEl);
  }

  // Serie dots
  const seriesRow = document.createElement('div');
  seriesRow.className = 'series-row';
  for (let i = 0; i < ex.serie; i++) {
    const dot = document.createElement('button');
    dot.className = 'serie-dot' + (sessionData[ex.id].done[i] ? (i === ex.serie-1 ? ' last-done' : ' done') : '');
    dot.textContent = i + 1;
    dot.setAttribute('aria-label', 'Serie ' + (i+1));
    dot.addEventListener('click', () => handleDotClick(ex, i, dot));
    seriesRow.appendChild(dot);
  }
  card.appendChild(seriesRow);

  // Input fields
  const inputsRow = document.createElement('div');
  inputsRow.className = 'serie-inputs';
  const sd = sessionData[ex.id];

  // Peso
  const grPeso = document.createElement('div');
  grPeso.className = 'input-group';
  grPeso.innerHTML = '<label>Peso (kg)</label>';
  const inPeso = document.createElement('input');
  inPeso.type = 'text';
  inPeso.placeholder = 'es. 80';
  inPeso.value = sd.sets[0]?.peso || '';
  inPeso.addEventListener('input', e => {
    sd.sets.forEach(s => s.peso = e.target.value);
  });
  grPeso.appendChild(inPeso);

  // Reps effettive
  const grReps = document.createElement('div');
  grReps.className = 'input-group';
  grReps.innerHTML = '<label>Reps effettive</label>';
  const inReps = document.createElement('input');
  inReps.type = 'text';
  inReps.placeholder = ex.reps;
  inReps.value = sd.sets[0]?.reps || '';
  inReps.addEventListener('input', e => {
    sd.sets.forEach(s => s.reps = e.target.value);
  });
  grReps.appendChild(inReps);

  // Note libere
  const grNote = document.createElement('div');
  grNote.className = 'input-group';
  grNote.style.flexBasis = '100%';
  grNote.innerHTML = '<label>Note</label>';
  const inNote = document.createElement('textarea');
  inNote.placeholder = 'Come è andata la serie?';
  inNote.value = sd.sets[0]?.note || '';
  inNote.addEventListener('input', e => {
    sd.sets.forEach(s => s.note = e.target.value);
  });
  grNote.appendChild(inNote);

  inputsRow.appendChild(grPeso);
  inputsRow.appendChild(grReps);
  inputsRow.appendChild(grNote);
  card.appendChild(inputsRow);

  // History button handler
  header.querySelector('.history-btn').addEventListener('click', e => {
    e.stopPropagation();
    openHistoryDrawer(ex);
  });

  return card;
}

// ============================================================
// DOT CLICK → TIMER
// ============================================================
function handleDotClick(ex, idx, dot) {
  const sd = sessionData[ex.id];
  const wasD = sd.done[idx];

  // Toggle done
  sd.done[idx] = !wasD;

  // Update dot visual
  const card = document.getElementById('ex-card-' + ex.id);
  const dots = card.querySelectorAll('.serie-dot');
  dots.forEach((d, i) => {
    d.classList.remove('done', 'last-done');
    if (sd.done[i]) {
      d.classList.add(i === ex.serie - 1 ? 'last-done' : 'done');
    }
  });

  // Start timer when marking as done (not on uncheck, not on last set)
  if (!wasD && idx < ex.serie - 1) {
    const recupero = ex.recupero || 90;
    startTimer(recupero, ex.nome, idx + 1, ex.serie);
  }
  // On last set done
  if (!wasD && idx === ex.serie - 1) {
    card.classList.add('active-rest');
    setTimeout(() => card.classList.remove('active-rest'), 1500);
  }
}

// ============================================================
// TIMER
// ============================================================
function startTimer(seconds, exName, serieN, totalSeries) {
  stopTimer();
  timerTotal = seconds;
  timerRemaining = seconds;
  timerPaused = false;
  timerExerciseName = exName;

  const overlay = document.getElementById('timer-overlay');
  const display = document.getElementById('timer-display');
  const bar = document.getElementById('timer-progress-bar');
  const exNameEl = document.getElementById('timer-ex-name');
  const serieInfoEl = document.getElementById('timer-serie-info');
  const pauseBtn = document.getElementById('timer-pause');

  overlay.classList.add('active');
  exNameEl.textContent = exName;
  serieInfoEl.textContent = 'Serie ' + serieN + ' completata — prossima: ' + (serieN+1 <= totalSeries ? serieN+1 : '-');
  pauseBtn.textContent = 'Pausa';
  display.classList.remove('warning', 'done-color');
  bar.classList.remove('warning');

  updateTimerDisplay();

  timerInterval = setInterval(() => {
    if (timerPaused) return;
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      timerDone();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const display = document.getElementById('timer-display');
  const bar = document.getElementById('timer-progress-bar');
  const mins = Math.floor(timerRemaining / 60);
  const secs = timerRemaining % 60;
  display.textContent = mins + ':' + String(secs).padStart(2,'0');
  const pct = (timerRemaining / timerTotal) * 100;
  bar.style.width = pct + '%';
  if (timerRemaining <= 10 && timerRemaining > 0) {
    display.classList.add('warning');
    bar.classList.add('warning');
  } else {
    display.classList.remove('warning');
    bar.classList.remove('warning');
  }
}

function timerDone() {
  const display = document.getElementById('timer-display');
  const overlay = document.getElementById('timer-overlay');
  display.textContent = 'VIA!';
  display.classList.add('done-color');
  // 3 beep
  playBeep(440, 0.0);
  playBeep(440, 0.15);
  playBeep(600, 0.30);
  setTimeout(() => {
    overlay.classList.remove('active');
    display.classList.remove('done-color');
  }, 1800);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerPaused = false;
}

// Audio beep via Web Audio API
function playBeep(freq, delayS) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    setTimeout(() => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.2);
    }, delayS * 1000);
  } catch(e) {}
}

// Timer button handlers
document.getElementById('timer-skip').addEventListener('click', () => {
  stopTimer();
  document.getElementById('timer-overlay').classList.remove('active');
});

document.getElementById('timer-pause').addEventListener('click', function() {
  timerPaused = !timerPaused;
  this.textContent = timerPaused ? 'Riprendi' : 'Pausa';
});

document.getElementById('timer-add30').addEventListener('click', () => {
  timerRemaining += 30;
  timerTotal += 30;
  updateTimerDisplay();
});

// ============================================================
// SAVE SESSION
// ============================================================
document.getElementById('save-session-btn').addEventListener('click', function() {
  const store = loadStorage();
  const key = sessionKey(currentWorkout.id, currentDayIndex, todayStr());
  store[key] = sessionData;
  saveStorage(store);
  const btn = this;
  const origHtml = btn.innerHTML;
  btn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M2 8l4 4 8-8"/></svg> Salvato!';
  btn.classList.add('saved');
  setTimeout(() => { btn.innerHTML = origHtml; btn.classList.remove('saved'); }, 2000);
});

// ============================================================
// HISTORY DRAWER
// ============================================================
function openHistoryDrawer(ex) {
  const store = loadStorage();
  const allEntries = [];
  // Scan all sessions for this exercise
  Object.entries(store).forEach(([key, session]) => {
    if (session[ex.id]) {
      const parts = key.split('__');
      const date = parts[2] || 'N/D';
      const sd = session[ex.id];
      if (sd.sets && sd.sets[0] && (sd.sets[0].peso || sd.sets[0].reps)) {
        allEntries.push({ date, sets: sd.sets, done: sd.done });
      }
    }
  });
  allEntries.sort((a,b) => b.date.localeCompare(a.date));

  document.getElementById('drawer-title').textContent = ex.nome;
  const body = document.getElementById('drawer-body');
  if (!allEntries.length) {
    body.innerHTML = '<p class="history-empty">Nessun dato salvato per questo esercizio.</p>';
  } else {
    body.innerHTML = allEntries.map(e => {
      const s = e.sets[0];
      return `<div class="history-entry">
        <div class="history-date">${formatDate(e.date)}</div>
        ${s.peso ? `<div class="history-weight">${s.peso} kg</div>` : ''}
        ${s.reps ? `<div class="history-reps">${s.reps} reps</div>` : ''}
        ${s.note ? `<div class="history-note">${s.note}</div>` : ''}
      </div>`;
    }).join('');
  }

  document.getElementById('history-drawer').classList.add('open');
  document.getElementById('drawer-backdrop').classList.add('open');
}

function formatDate(dateStr) {
  if (!dateStr || dateStr === 'N/D') return 'N/D';
  const [y,m,d] = dateStr.split('-');
  return d + '/' + m + '/' + y;
}

document.getElementById('drawer-close').addEventListener('click', closeDrawer);
document.getElementById('drawer-backdrop').addEventListener('click', closeDrawer);
function closeDrawer() {
  document.getElementById('history-drawer').classList.remove('open');
  document.getElementById('drawer-backdrop').classList.remove('open');
}

// ============================================================
// NAVIGATION
// ============================================================
document.getElementById('back-to-selector').addEventListener('click', showSelectorScreen);
document.getElementById('back-to-days').addEventListener('click', () => {
  stopTimer();
  document.getElementById('timer-overlay').classList.remove('active');
  showDaysScreen(currentWorkout);
});
document.getElementById('btn-change-workout').addEventListener('click', () => {
  stopTimer();
  document.getElementById('timer-overlay').classList.remove('active');
  showSelectorScreen();
});

// ============================================================
// INIT
// ============================================================
loadWorkouts();
</script>
